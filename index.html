<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8-Bit Vault</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  overflow:hidden;
  background:black;
  color:white;
  font-family:'Courier New', monospace;
}

/* STARFIELD */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:-2;
}

/* SCREEN SYSTEM */
.screen {
  position:absolute;
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  opacity:0;
  pointer-events:none;
  transform:translateY(20px);
  transition:opacity 0.5s ease, transform 0.5s ease;
}

.screen.active {
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}

.title {
  font-size:2rem;
  letter-spacing:3px;
}

.subtitle {
  margin-top:20px;
  font-size:0.9rem;
  opacity:0.75;
  max-width:340px;
  line-height:1.5;
}

/* NEON BUTTON */
.button {
  margin-top:25px;
  padding:12px 28px;
  font-size:0.9rem;
  letter-spacing:2px;
  background:transparent;
  border:2px solid;
  cursor:pointer;
  transition:0.3s;
  text-transform:uppercase;
}

.button:hover {
  background:rgba(255,255,255,0.05);
  transform:scale(1.05);
}

.cyan { border-color:#00ffff; color:#00ffff; box-shadow:0 0 10px #00ffff; }
.green { border-color:#00ff88; color:#00ff88; box-shadow:0 0 10px #00ff88; }
.blue  { border-color:#0099ff; color:#0099ff; box-shadow:0 0 10px #0099ff; }
.white { border-color:#ffffff; color:#ffffff; box-shadow:0 0 8px #ffffff; }

/* INPUT */
input {
  margin-top:20px;
  padding:12px;
  font-size:1.2rem;
  text-align:center;
  background:black;
  color:white;
  border:2px solid #00ff88;
  outline:none;
  width:180px;
}

/* WRONG PASSWORD ANIMATIONS */
@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  50% { transform: translateX(6px); }
  75% { transform: translateX(-6px); }
  100% { transform: translateX(0); }
}

.shake { animation: shake 0.3s; }

@keyframes errorGlow {
  0% { box-shadow: 0 0 15px red; border-color:red; }
  100% { box-shadow: 0 0 10px #00ff88; border-color:#00ff88; }
}

.errorGlow { animation: errorGlow 0.4s; }

@keyframes flicker {
  0% { opacity:1; }
  20% { opacity:0.2; }
  40% { opacity:1; }
  60% { opacity:0.3; }
  80% { opacity:1; }
  100% { opacity:1; }
}

.flicker { animation:flicker 0.3s; }

/* HEARTS */
.heart {
  position:fixed;
  width:8px;
  height:8px;
  background:red;
  transform:rotate(45deg);
  animation:floatUp 2s linear forwards;
  z-index:-1;
}

.heart:before,
.heart:after {
  content:'';
  position:absolute;
  width:8px;
  height:8px;
  background:red;
  border-radius:50%;
}

.heart:before { top:-4px; left:0; }
.heart:after { left:-4px; top:0; }

@keyframes floatUp {
  0% { transform: translateY(0) rotate(45deg); opacity:1; }
  100% { transform: translateY(-300px) rotate(45deg); opacity:0; }
}

.footer {
  position:absolute;
  bottom:15px;
  font-size:0.7rem;
  opacity:0.6;
}
</style>
</head>

<body>

<canvas id="starfield"></canvas>

<!-- BOOT -->
<div id="bootScreen" class="screen active">
  <div class="title">8-BIT VAULT</div>
  <div class="subtitle">Version 1.0</div>
  <div class="button white" onclick="startGame()">PRESS START</div>
  <div class="footer">© SillyStarer</div>
</div>

<!-- CODE -->
<div id="codeScreen" class="screen">
  <div class="title">ENTER ACCESS CODE</div>
  <input id="codeInput" type="password" maxlength="6">
  <div id="confirmBtn" class="button green" onclick="checkCode()">CONFIRM</div>
</div>

<!-- WELCOME -->
<div id="welcomeScreen" class="screen">
  <div class="title">WELCOME, MY FAVOURITE STARE.</div>
  <div class="subtitle">
    You’ve accessed a private vault.<br>
    Inside are 24 side quests.<br>
    Some restore HP.<br>
    Some boost XP.<br>
    Some unlock after dark mode.<br><br>
    Proceed carefully.
  </div>
  <div class="button cyan" onclick="showScreen('rulesScreen')">VIEW RULES</div>
</div>

<script>

/* SCREEN SWITCH */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  setTimeout(()=>{document.getElementById(id).classList.add("active");},100);
}

/* STARFIELD */
const canvas=document.getElementById("starfield");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let stars=[];
for(let i=0;i<200;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2,
    speed:Math.random()*1+0.3
  });
}

function animateStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  stars.forEach(star=>{
    ctx.fillRect(star.x,star.y,star.size,star.size);
    star.y+=star.speed;
    if(star.y>canvas.height){
      star.y=0;
      star.x=Math.random()*canvas.width;
    }
  });
  requestAnimationFrame(animateStars);
}
animateStars();

/* MUSIC */
let audioCtx,gainNode,melodyInterval;

function startMusic(){
  if(!audioCtx){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    gainNode=audioCtx.createGain();
    gainNode.gain.value=0.08;
    gainNode.connect(audioCtx.destination);
  }
  if(audioCtx.state==="suspended"){audioCtx.resume();}

  function tone(f,d,delay){
    const osc=audioCtx.createOscillator();
    osc.type="square";
    osc.frequency.value=f;
    osc.connect(gainNode);
    osc.start(audioCtx.currentTime+delay);
    osc.stop(audioCtx.currentTime+delay+d);
  }

  function melody(){
    tone(220,0.2,0);
    tone(330,0.2,0.3);
    tone(440,0.2,0.6);
    tone(330,0.2,0.9);
  }

  if(!melodyInterval){
    melody();
    melodyInterval=setInterval(melody,1600);
  }
}

/* FLOW */
function startGame(){
  startMusic();
  showScreen("codeScreen");
}

function createHearts(){
  for(let i=0;i<30;i++){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.style.left=Math.random()*window.innerWidth+"px";
    heart.style.bottom="0px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),2000);
  }
}

function checkCode(){
  const val=document.getElementById("codeInput").value;
  const input=document.getElementById("codeInput");
  const title=document.querySelector("#codeScreen .title");

  if(val==="280226"){
    createHearts();
    setTimeout(()=>showScreen("welcomeScreen"),1000);
  } else {
    input.classList.add("shake","errorGlow");
    title.classList.add("flicker");
    setTimeout(()=>{
      input.classList.remove("shake","errorGlow");
      title.classList.remove("flicker");
      input.value="";
    },400);
  }
}

</script>

</body>
</html>
