<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8-Bit Vault</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:black;
  color:white;
  font-family:'Courier New',monospace;
  overflow:hidden;
}

/* STARFIELD */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-2;
}

/* SCREEN SYSTEM */
.screen{
  position:absolute;
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  opacity:0;
  pointer-events:none;
  transform:translateY(20px);
  transition:0.5s;
}

.screen.active{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}

.title{
  font-size:2rem;
  letter-spacing:3px;
}

.subtitle{
  margin-top:20px;
  font-size:0.9rem;
  opacity:0.75;
  max-width:340px;
  line-height:1.5;
}

/* BUTTONS */
.button{
  margin-top:20px;
  padding:12px 28px;
  font-size:0.8rem;
  letter-spacing:2px;
  background:transparent;
  border:2px solid;
  cursor:pointer;
  transition:0.3s;
  text-transform:uppercase;
}

.button:hover{
  background:rgba(255,255,255,0.05);
  transform:scale(1.05);
}

.cyan{border-color:#00ffff;color:#00ffff;box-shadow:0 0 10px #00ffff;}
.green{border-color:#00ff88;color:#00ff88;box-shadow:0 0 10px #00ff88;}
.blue{border-color:#0099ff;color:#0099ff;box-shadow:0 0 10px #0099ff;}
.white{border-color:#ffffff;color:#ffffff;box-shadow:0 0 8px #ffffff;}

/* INPUT */
input{
  margin-top:20px;
  padding:12px;
  font-size:1.2rem;
  text-align:center;
  background:black;
  color:white;
  border:2px solid #00ff88;
  width:180px;
  outline:none;
}

/* WRONG PASSWORD ANIMATION */
@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(-6px);}
  50%{transform:translateX(6px);}
  75%{transform:translateX(-6px);}
  100%{transform:translateX(0);}
}
.shake{animation:shake 0.3s;}

@keyframes errorGlow{
  0%{box-shadow:0 0 15px red;border-color:red;}
  100%{box-shadow:0 0 10px #00ff88;border-color:#00ff88;}
}
.errorGlow{animation:errorGlow 0.4s;}

@keyframes flicker{
  0%{opacity:1;}
  20%{opacity:0.2;}
  40%{opacity:1;}
  60%{opacity:0.3;}
  80%{opacity:1;}
  100%{opacity:1;}
}
.flicker{animation:flicker 0.3s;}

/* HEARTS */
.heart{
  position:fixed;
  width:8px;
  height:8px;
  background:red;
  transform:rotate(45deg);
  animation:floatUp 2s linear forwards;
  z-index:-1;
}
.heart:before,
.heart:after{
  content:'';
  position:absolute;
  width:8px;
  height:8px;
  background:red;
  border-radius:50%;
}
.heart:before{top:-4px;left:0;}
.heart:after{left:-4px;top:0;}

@keyframes floatUp{
  0%{transform:translateY(0) rotate(45deg);opacity:1;}
  100%{transform:translateY(-300px) rotate(45deg);opacity:0;}
}

/* ARCADE GRID */
#arcadeScreen{
  overflow-y:auto;
  padding:60px 20px 40px 20px;
  align-items:flex-start;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
  width:100%;
  max-width:500px;
}

.tile{
  position:relative;
  height:100px;
  border:2px solid #00ffff;
  padding:12px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  opacity:0;
  transform:translateY(20px);
  transition:0.4s;
}

.tile.show{
  opacity:1;
  transform:translateY(0);
}

.tile:before{
  content:"";
  position:absolute;
  top:-2px;
  left:-2px;
  right:-2px;
  height:20px;
  border:2px solid #00ffff;
  border-bottom:none;
}

.tile-title{
  font-size:0.75rem;
  letter-spacing:1px;
}

.tile-sub{
  font-size:0.6rem;
  opacity:0.6;
  margin-top:4px;
}

/* LETTER OVERLAY */
#letterOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  background:rgba(0,0,0,0.95);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  opacity:0;
  pointer-events:none;
  transition:0.4s;
}

#letterOverlay.active{
  opacity:1;
  pointer-events:auto;
}

.footer{
  position:absolute;
  bottom:15px;
  font-size:0.7rem;
  opacity:0.6;
}
</style>
</head>

<body>

<canvas id="starfield"></canvas>

<!-- BOOT -->
<div id="bootScreen" class="screen active">
  <div class="title">8-BIT VAULT</div>
  <div class="subtitle">Version 3.0</div>
  <div class="button white" onclick="startGame()">PRESS START</div>
  <div class="footer">© SillyStarer</div>
</div>

<!-- CODE -->
<div id="codeScreen" class="screen">
  <div class="title">ENTER ACCESS CODE</div>
  <input id="codeInput" type="password" maxlength="6">
  <div class="button green" onclick="checkCode()">CONFIRM</div>
</div>

<!-- WELCOME -->
<div id="welcomeScreen" class="screen">
  <div class="title">WELCOME, MY FAVOURITE STARE.</div>
  <div class="button cyan" onclick="showScreen('rulesScreen')">VIEW RULES</div>
</div>

<!-- RULES -->
<div id="rulesScreen" class="screen">
  <div class="title">GAME RULES</div>
  <div class="subtitle">
    Open only when it matches your mood.<br><br>
    No speed-running emotions.<br><br>
    After Dark Mode requires honesty.
  </div>
  <div class="button blue" onclick="enterArcade()">ENTER ARCADE</div>
  <div class="button white" onclick="showScreen('welcomeScreen')">RETURN</div>
</div>

<!-- ARCADE -->
<div id="arcadeScreen" class="screen">
  <div class="grid" id="grid"></div>
</div>

<!-- LETTER OVERLAY -->
<div id="letterOverlay">
  <div id="letterContent"></div>
  <div class="button white" onclick="closeLetter()">CLOSE</div>
</div>

<script>

/* SCREEN SWITCH */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  setTimeout(()=>{document.getElementById(id).classList.add("active");},100);
}

/* MUSIC */
let audioCtx,gainNode,melodyInterval;

function startMusic(){
  if(!audioCtx){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    gainNode=audioCtx.createGain();
    gainNode.gain.value=0.08;
    gainNode.connect(audioCtx.destination);
  }
  if(audioCtx.state==="suspended"){audioCtx.resume();}

  function tone(f,d,delay){
    const osc=audioCtx.createOscillator();
    osc.type="square";
    osc.frequency.value=f;
    osc.connect(gainNode);
    osc.start(audioCtx.currentTime+delay);
    osc.stop(audioCtx.currentTime+delay+d);
  }

  function melody(){
    tone(220,0.2,0);
    tone(330,0.2,0.3);
    tone(440,0.2,0.6);
    tone(330,0.2,0.9);
  }

  if(!melodyInterval){
    melody();
    melodyInterval=setInterval(melody,1600);
  }
}

function startGame(){
  startMusic();
  showScreen("codeScreen");
}

/* HEARTS */
function createHearts(){
  for(let i=0;i<30;i++){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.style.left=Math.random()*window.innerWidth+"px";
    heart.style.bottom="0px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),2000);
  }
}

/* PASSWORD */
function checkCode(){
  const val=document.getElementById("codeInput").value;
  const input=document.getElementById("codeInput");
  const title=document.querySelector("#codeScreen .title");

  if(val==="280226"){
    createHearts();
    setTimeout(()=>showScreen("welcomeScreen"),900);
  } else {
    input.classList.add("shake","errorGlow");
    title.classList.add("flicker");
    setTimeout(()=>{
      input.classList.remove("shake","errorGlow");
      title.classList.remove("flicker");
      input.value="";
    },400);
  }
}

/* LETTER DATA (Add full 24 later) */
const letters=[
  {title:"LEVEL UP",sub:"when you're sad",text:"You are stronger than you think."},
  {title:"GHOST MODE",sub:"when you're overthinking",text:"Breathe. Slow down."},
  {title:"HP RESTORE",sub:"when you need a hug",text:"Imagine I’m hugging you."},
  {title:"AFTER DARK",sub:"when you're naughty",text:"This level unlocks secrets."}
];

const grid=document.getElementById("grid");

letters.forEach((l,i)=>{
  const tile=document.createElement("div");
  tile.classList.add("tile");
  tile.innerHTML=`<div class="tile-title">${l.title}</div>
                  <div class="tile-sub">${l.sub}</div>`;
  tile.onclick=()=>openLetter(l);
  grid.appendChild(tile);
});

function enterArcade(){
  showScreen("arcadeScreen");
  const tiles=document.querySelectorAll(".tile");
  tiles.forEach((tile,i)=>{
    setTimeout(()=>tile.classList.add("show"),i*120);
  });
}

function openLetter(letter){
  document.getElementById("letterContent").innerHTML=
    `<h2>${letter.title}</h2><p style="margin-top:15px;">${letter.text}</p>`;
  document.getElementById("letterOverlay").classList.add("active");
}

function closeLetter(){
  document.getElementById("letterOverlay").classList.remove("active");
}

/* STARFIELD */
const canvas=document.getElementById("starfield");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let stars=[];
for(let i=0;i<200;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2,
    speed:Math.random()*1+0.3
  });
}

function animateStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  stars.forEach(star=>{
    ctx.fillRect(star.x,star.y,star.size,star.size);
    star.y+=star.speed;
    if(star.y>canvas.height){
      star.y=0;
      star.x=Math.random()*canvas.width;
    }
  });
  requestAnimationFrame(animateStars);
}
animateStars();

</script>
</body>
</html>
