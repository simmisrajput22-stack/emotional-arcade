<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8-Bit Vault</title><style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:black;
color:white;
font-family:'Courier New',monospace;
overflow:hidden;
}

/* STARFIELD */

canvas{
position:fixed;
top:0;
left:0;
z-index:-5;
}

/* SCREEN SYSTEM */

.screen{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
opacity:0;
pointer-events:none;
transition:0.4s;
}

.screen.active{
opacity:1;
pointer-events:auto;
}

.title{
font-size:1.8rem;
letter-spacing:3px;
}

.subtitle{
margin-top:20px;
font-size:0.9rem;
opacity:0.8;
max-width:340px;
line-height:1.6;
}

/* BUTTONS */

.button{
margin-top:24px;
padding:12px 28px;
font-size:0.8rem;
letter-spacing:2px;
background:transparent;
border:2px solid;
cursor:pointer;
transition:0.3s;
text-transform:uppercase;
}

.white{border-color:white;color:white;}
.green{border-color:#00ff88;color:#00ff88;}
.cyan{border-color:#00ffff;color:#00ffff;}
.blue{border-color:#0099ff;color:#0099ff;}

input{
margin-top:20px;
padding:12px;
font-size:1.2rem;
text-align:center;
background:black;
color:white;
border:2px solid #00ff88;
width:180px;
}

/* ARCADE */

#arcadeScreen{
display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:center;
}

.arcade-header{
position:fixed;
top:0;
width:100%;
padding:40px 20px 20px;
background:black;
z-index:10;
}

.arcade-grid-wrapper{
width:100%;
max-width:500px;
height:calc(100vh - 120px);
overflow-y:auto;
padding:140px 20px 40px;

border:3px solid #00ffff;
border-radius:12px;

box-shadow:
0 0 20px #00ffff,
inset 0 0 25px rgba(0,255,255,0.2);

background:rgba(0,0,0,0.4);

animation:arcadeGlow 3s infinite alternate;
}

@keyframes arcadeGlow{
0%{box-shadow:0 0 10px #00ffff;}
100%{box-shadow:0 0 30px #00ffff;}
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
}

/* TILE */

.tile{
height:110px;
border:2px solid;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
opacity:0;
transform:translateY(20px);
transition:0.4s;
}

.tile.show{
opacity:1;
transform:translateY(0);
}

.tile-title{font-size:0.75rem;}
.tile-sub{font-size:0.6rem;opacity:0.6;margin-top:4px;}

.envelope{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.paper{font-size:22px;margin-bottom:4px;}

/* LETTER */

#letterOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:rgba(0,0,0,0.85);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
text-align:center;
opacity:0;
pointer-events:none;
transition:0.4s;
z-index:20;
}

#letterOverlay.active{
opacity:1;
pointer-events:auto;
}

/* HEARTS */

.heart{
position:fixed;
width:8px;
height:8px;
background:red;
transform:rotate(45deg);
animation:floatUp 2s linear forwards;
}

.heart:before,.heart:after{
content:'';
position:absolute;
width:8px;
height:8px;
background:red;
border-radius:50%;
}

.heart:before{top:-4px;}
.heart:after{left:-4px;}

@keyframes floatUp{
0%{transform:translateY(0) rotate(45deg);opacity:1;}
100%{transform:translateY(-300px) rotate(45deg);opacity:0;}
}

/* SECRET PHOTO */

.secret-photo{
width:220px;
max-width:80%;
margin:20px 0;
border:3px solid #ff00ff;
border-radius:10px;
box-shadow:0 0 20px #ff00ff;
}

</style></head><body><canvas id="starfield"></canvas>

<div id="bootScreen" class="screen active">
<div class="title">8-BIT VAULT</div>
<div class="button white" onclick="startGame()">PRESS START</div>
</div><div id="codeScreen" class="screen">
<div class="title">ENTER ACCESS CODE</div>
<input id="codeInput" type="password" maxlength="6">
<div class="button green" onclick="checkCode()">CONFIRM</div>
</div><div id="welcomeScreen" class="screen">
<div class="title">WELCOME, MY FAVOURITE STARE</div>
<div class="subtitle">
Inside this vault are small files for different moments.<br>
Explore slowly.
</div>
<div class="button cyan" onclick="showScreen('rulesScreen')">VIEW RULES</div>
</div><div id="rulesScreen" class="screen">
<div class="title">GAME RULES</div>
<div class="subtitle">
Each tile opens a message.<br>
Some levels are soft.<br>
Some are ridiculous.<br>
Some are dangerous.
</div>
<div class="button blue" onclick="enterArcade()">ENTER ARCADE</div>
</div><div id="arcadeScreen" class="screen"><div class="arcade-header">
<div class="title">ARCADE GRID</div>
</div><div class="arcade-grid-wrapper">
<div class="grid" id="grid"></div>
</div></div><div id="letterOverlay">
<div id="letterContent"></div>
<div class="button white" onclick="closeLetter()">CLOSE</div>
</div><script>

/* SCREEN SWITCH */

function showScreen(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* PASSWORD */

function startGame(){
showScreen("codeScreen");
}

function checkCode(){

const input=document.getElementById("codeInput");

if(input.value==="280226"){
showScreen("welcomeScreen");
}else{
input.value="";
}

}

/* LETTERS */

let lettersOpened=0;
let secretUnlocked=false;

const letters=[

["🍄","LEVEL UP","when you're sad","Even on your lowest days you still carry strength."],
["🏆","ACHIEVEMENT UNLOCKED","when celebrating","You earned this."],
["⚡","POWER BOOST","motivation","You don’t lack ability."],
["👻","GHOST MODE","overthinking","Pause. Thoughts are not facts."],
["🚨","HIGH ALERT","stressed","You’ve survived worse days."],
["🧩","PIECES NOT FITTING","bad day","Not every day aligns."],
["🔋","LOW BATTERY","lazy","Rest is not failure."],
["🥊","FIGHT MODE","angry","Feel it. Then breathe."],
["❤️","HP RESTORE","need a hug","Imagine my arms around you."],
["💊","HEALING CENTER","sick","Slow down."],
["💋","AFFECTION BOOST","need a kiss","Consider this one."],
["⭐","FREE ROAM","need attention","You’re allowed to want me."],
["🔥","AFTER DARK","naughty","Some things feel better slowly."],
["🕷","WEB OF THOUGHTS","lonely","Even when alone you’re connected."],
["🏠","FAR FROM HOME","miss home","Distance doesn’t erase belonging."],
["🌧","RAINY DAY MODE","raining","Let the rain slow things down."],
["🦆","BONUS ROUND","need a laugh","You deserve lightness."],
["🌙","MIDNIGHT SERVER","can't sleep","Close your eyes."],
["🎉","VICTORY SCREEN","happy","Stay in this moment."],
["🎂","ANNUAL EVENT","birthday","Another year leveled up."],
["🚗","ON MY WAY","coming to see me","The countdown begins."],
["📡","LOW SIGNAL","feeling distant","Even weak signals connect."],
["🔌","ENERGY RECHARGE","drained","Refill. Reset."],
["🎮","SIDE QUEST","bored","Find something small to conquer."]

];

const grid=document.getElementById("grid");

letters.forEach(l=>{

const tile=document.createElement("div");

tile.classList.add("tile","show");

tile.style.borderColor="#00ffff";

tile.innerHTML=`
<div class="envelope">
<div class="paper">${l[0]}</div>
<div class="tile-title">${l[1]}</div>
<div class="tile-sub">${l[2]}</div>
</div>
`;

tile.onclick=()=>openLetter(l);

grid.appendChild(tile);

});

/* OPEN LETTER */

function openLetter(letter){

document.getElementById("letterOverlay").classList.add("active");

lettersOpened++;

if(lettersOpened>=5 && !secretUnlocked){
unlockSecretTile();
secretUnlocked=true;
}

document.getElementById("letterContent").innerHTML=
`<h2>${letter[1]}</h2><p>${letter[3]}</p>`;

createHearts();

}

/* HEARTS */

function createHearts(){

for(let i=0;i<20;i++){

const h=document.createElement("div");
h.className="heart";

h.style.left=Math.random()*window.innerWidth+"px";
h.style.bottom="0px";

document.body.appendChild(h);

setTimeout(()=>h.remove(),2000);

}

}

/* SECRET TILE */

function unlockSecretTile(){

const tile=document.createElement("div");

tile.classList.add("tile","show");
tile.style.borderColor="#ff00ff";

tile.innerHTML=`
<div class="envelope">
<div class="paper">⚠</div>
<div class="tile-title">DO NOT OPEN</div>
<div class="tile-sub">seriously</div>
</div>
`;

tile.onclick=()=>{

document.getElementById("letterOverlay").classList.add("active");

document.getElementById("letterContent").innerHTML=`

<h2 style="color:#ff00ff">YOU WERE WARNED</h2>

<p>I told you not to open this.</p>

<div class="button white" onclick="showReward()">SHOW REWARD</div>

<div id="rewardArea"></div>

`;

};

grid.appendChild(tile);

}

/* PHOTO REVEAL */

function showReward(){

document.getElementById("rewardArea").innerHTML=`
<img src="secret.jpg" class="secret-photo">
<p>Your favourite outfit.<br>Just for you.</p>
`;

}

/* CLOSE */

function closeLetter(){
document.getElementById("letterOverlay").classList.remove("active");
}

/* STARFIELD */

const canvas=document.getElementById("starfield");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<150;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*1
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{

ctx.fillRect(s.x,s.y,s.size,s.size);

s.y+=s.speed;

if(s.y>canvas.height){
s.y=0;
s.x=Math.random()*canvas.width;
}

});

requestAnimationFrame(animate);

}

animate();

</script></body>
</html>
