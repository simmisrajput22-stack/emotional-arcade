<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emotional Arcade</title>

<style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    background: black;
    font-family: 'Courier New', monospace;
    color: white;
}

/* STARFIELD CANVAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* CENTER CONTENT */
.screen {
    position: absolute;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.title {
    font-size: 2rem;
    letter-spacing: 3px;
}

.subtitle {
    margin-top: 10px;
    font-size: 0.9rem;
    opacity: 0.7;
}

.press-start {
    margin-top: 40px;
    font-size: 1.2rem;
    cursor: pointer;
    animation: blink 1.2s infinite;
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

.footer {
    position: absolute;
    bottom: 10px;
    font-size: 0.7rem;
    opacity: 0.6;
}
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div id="bootScreen" class="screen">
    <div class="title">EMOTIONAL ARCADE</div>
    <div class="subtitle">Version 1.0</div>
    <div class="press-start" onclick="startGame()">PRESS START</div>
    <div class="footer">© SillyStarer</div>
</div>

<script>
// STARFIELD
const canvas = document.getElementById("starfield");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 200; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 1 + 0.2
    });
}

function animateStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";

    stars.forEach(star => {
        ctx.fillRect(star.x, star.y, star.size, star.size);
        star.y += star.speed;

        if (star.y > canvas.height) {
            star.y = 0;
            star.x = Math.random() * canvas.width;
        }
    });

    requestAnimationFrame(animateStars);
}

animateStars();

// CHECK IF ALREADY UNLOCKED
if (localStorage.getItem("arcadeUnlocked") === "true") {
    document.getElementById("bootScreen").style.display = "none";
    showWelcome();
}

// START GAME
let audioStarted = false;
let audioCtx;

function startGame() {
    document.getElementById("bootScreen").style.display = "none";

    if (!audioStarted) {
        startMusic();
        audioStarted = true;
    }

    showCodeScreen();
}

function startMusic() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.05; // volume (soft)
    gainNode.connect(audioCtx.destination);

    function playTone(freq, time) {
        const osc = audioCtx.createOscillator();
        osc.type = "square";
        osc.frequency.value = freq;
        osc.connect(gainNode);
        osc.start(audioCtx.currentTime + time);
        osc.stop(audioCtx.currentTime + time + 0.2);
    }

    function loopMelody() {
        const notes = [220, 330, 440, 330];
        notes.forEach((note, i) => {
            playTone(note, i * 0.4);
        });

        setTimeout(loopMelody, 1600);
    }

    loopMelody();
}

// SHOW CODE SCREEN
function showCodeScreen() {
    document.body.innerHTML += `
    <div id="codeScreen" class="screen">
        <div class="title">ENTER ACCESS CODE</div>
        <input id="codeInput" type="password" maxlength="6"
        style="margin-top:20px;padding:10px;font-size:1.5rem;text-align:center;background:black;color:white;border:2px solid white;">
        <div class="press-start" onclick="checkCode()">CONFIRM</div>
    </div>`;
}

// CHECK CODE
function checkCode() {
    const input = document.getElementById("codeInput").value;
    if (input === "280226") {
        localStorage.setItem("arcadeUnlocked", "true");
        document.getElementById("codeScreen").remove();
        showWelcome();
    } else {
        alert("ACCESS DENIED");
    }
}

// SHOW WELCOME SCREEN
function showWelcome() {
    document.body.innerHTML += `
    <div id="welcomeScreen" class="screen">
        <div class="title">WELCOME, MY FAVOURITE STARE.</div>
        <div class="subtitle" style="margin-top:20px;max-width:300px;">
        You have unlocked a private server.<br>
        Inside are 24 emotional side quests.<br>
        Some restore HP.<br>
        Some boost XP.<br>
        Some are… after dark DLC.<br><br>
        Each one was designed specifically for you.<br>
        No microtransactions required.<br>
        Just press start when you're ready.
        </div>
        <div class="press-start" onclick="alert('Letters coming next phase')">
        ENTER ARCADE
        </div>
        <div class="footer">Built by: SillyStarer</div>
    </div>`;
}
</script>

</body>
</html>
