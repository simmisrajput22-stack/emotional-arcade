<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emotional Arcade</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  overflow: hidden;
  background: black;
  color: white;
  font-family: 'Courier New', monospace;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

.screen {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.title {
  font-size: 2rem;
  letter-spacing: 3px;
}

.subtitle {
  margin-top: 15px;
  font-size: 0.9rem;
  opacity: 0.7;
  max-width: 320px;
}

.press-start {
  margin-top: 40px;
  font-size: 1.2rem;
  cursor: pointer;
  animation: blink 1.2s infinite;
}

@keyframes blink {
  0%,100% {opacity:1;}
  50% {opacity:0.3;}
}

.footer {
  position: absolute;
  bottom: 15px;
  font-size: 0.7rem;
  opacity: 0.6;
}

input {
  margin-top: 20px;
  padding: 10px;
  font-size: 1.5rem;
  text-align: center;
  background: black;
  color: white;
  border: 2px solid white;
}
</style>
</head>

<body>

<canvas id="starfield"></canvas>

<div id="bootScreen" class="screen">
  <div class="title">EMOTIONAL ARCADE</div>
  <div class="subtitle">Version 1.0</div>
  <div class="press-start" onclick="startGame()">PRESS START</div>
  <div class="footer">© SillyStarer</div>
</div>

<script>
/* ---------------- STARFIELD ---------------- */

const canvas = document.getElementById("starfield");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let stars = [];
for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speed: Math.random() * 1 + 0.3
  });
}

function animateStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "white";

  stars.forEach(star => {
    ctx.fillRect(star.x, star.y, star.size, star.size);
    star.y += star.speed;

    if (star.y > canvas.height) {
      star.y = 0;
      star.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(animateStars);
}
animateStars();

/* ---------------- MUSIC SYSTEM ---------------- */

let audioCtx;
let gainNode;
let melodyInterval;

function startMusic() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.08;
    gainNode.connect(audioCtx.destination);
  }

  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }

  function playTone(freq, duration, delay) {
    const osc = audioCtx.createOscillator();
    osc.type = "square";
    osc.frequency.value = freq;
    osc.connect(gainNode);
    osc.start(audioCtx.currentTime + delay);
    osc.stop(audioCtx.currentTime + delay + duration);
  }

  function playMelody() {
    playTone(220, 0.2, 0);
    playTone(330, 0.2, 0.3);
    playTone(440, 0.2, 0.6);
    playTone(330, 0.2, 0.9);
  }

  if (!melodyInterval) {
    playMelody();
    melodyInterval = setInterval(playMelody, 1600);
  }
}

/* ---------------- GAME FLOW ---------------- */

function startGame() {
  document.getElementById("bootScreen").style.display = "none";
  startMusic();
  showCodeScreen();
}

function showCodeScreen() {
  if (localStorage.getItem("arcadeUnlocked") === "true") {
    showWelcome();
    return;
  }

  const div = document.createElement("div");
  div.className = "screen";
  div.id = "codeScreen";

  div.innerHTML = `
    <div class="title">ENTER ACCESS CODE</div>
    <input id="codeInput" type="password" maxlength="6">
    <div class="press-start" onclick="checkCode()">CONFIRM</div>
  `;

  document.body.appendChild(div);
}

function checkCode() {
  const input = document.getElementById("codeInput").value;

  if (input === "280226") {
    localStorage.setItem("arcadeUnlocked", "true");
    document.getElementById("codeScreen").remove();
    showWelcome();
  } else {
    alert("ACCESS DENIED");
  }
}

function showWelcome() {
  const div = document.createElement("div");
  div.className = "screen";
  div.id = "welcomeScreen";

  div.innerHTML = `
    <div class="title">WELCOME, MY FAVOURITE STARE.</div>
    <div class="subtitle">
      You have unlocked a private server.<br>
      Inside are 24 emotional side quests.<br>
      Some restore HP.<br>
      Some boost XP.<br>
      Some are… after dark DLC.<br><br>
      Each one was designed specifically for you.<br>
      No microtransactions required.<br>
      Just press start when you're ready.
    </div>
    <div class="press-start">ENTER ARCADE</div>
    <div class="footer">Built by: SillyStarer</div>
  `;

  document.body.appendChild(div);
}
</script>

</body>
</html>
